services:
  wavelet:
#    build:
#      context: .
#      dockerfile: docker/Dockerfile
#      args:
    #        VERSION: v0.9.9
    image: ghcr.io/rain-kl/pixezsync:latest
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4317}
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE:-true}
      OTEL_SAMPLING_RATE: ${OTEL_SAMPLING_RATE:-1.0}
    ports:
      - "8061:8061"
    volumes:
      - ./uploads:/app/uploads
      - ./data/:/app/data
    depends_on:
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started

  redis:
    image: valkey/valkey:8.0-alpine
    restart: unless-stopped
    command: ["valkey-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./data/valkey:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5


  jaeger:
    image: jaegertracing/jaeger:${JAEGER_VERSION:-2.19.0}
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
      - "${JAEGER_OTLP_GRPC_PORT:-4317}:4317"
      - "${JAEGER_OTLP_HTTP_PORT:-4318}:4318"
